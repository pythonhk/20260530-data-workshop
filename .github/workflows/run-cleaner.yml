name: Run Encrypted Cleaner

on:
  pull_request_target:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: cleaner-${{ github.event.pull_request.head.repo.full_name }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  run-cleaner:
    runs-on: ubuntu-latest

    steps:
      - name: Validate changed files
        id: changed-files
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const allowedPaths = new Set([
              "pyproject.toml",
              "submission/clean.py.cms",
              "submission/manifest.json",
              "submission/manifest.sig",
              "uv.lock",
            ]);

            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const disallowed = files
              .map((file) => file.filename)
              .filter((filename) => !allowedPaths.has(filename));

            if (disallowed.length > 0) {
              core.setFailed(
                [
                  "This PR changes files outside the allowed tournament submission paths.",
                  "",
                  "Disallowed files:",
                  ...disallowed.map((filename) => `- ${filename}`),
                ].join("\n")
              );
              return;
            }

            core.notice("Changed files are limited to allowed submission paths.");
            core.setOutput("paths", JSON.stringify(files.map((file) => file.filename)));

      - name: Checkout trusted scorer
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          persist-credentials: false

      - name: Checkout submitted files
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-submission
          persist-credentials: false

      - name: Overlay allowed submitted files
        env:
          CHANGED_PATHS: ${{ steps.changed-files.outputs.paths }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import shutil
          from pathlib import Path

          for path in json.loads(os.environ["CHANGED_PATHS"]):
              source = Path("pr-submission") / path
              target = Path(path)
              if source.is_file():
                  target.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(source, target)
          PY
          test -f submission/clean.py.cms
          test -f submission/manifest.json
          rm -rf pr-submission

      - name: Verify team manifest signature
        run: |
          python3 .github/scripts/verify_team_manifest.py \
            --manifest submission/manifest.json \
            --signature submission/manifest.sig \
            --allowlist .github/tournament/team_allowlist.json \
            --ca-cert .github/tournament/public_keys/tournament_ca_cert.pem \
            --repository-root .

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Report dataset sizes
        run: |
          uv run python - <<'PY'
          import pandas as pd

          for path in [
              "data/train_features.csv",
              "data/test_features.csv",
              "data/train_labels.csv",
          ]:
              frame = pd.read_csv(path, dtype={"record_id": str})
              print(
                  f"{path}: rows={len(frame)} columns={len(frame.columns)} "
                  f"unique_record_id={frame['record_id'].nunique()}"
              )
          PY

      - name: Decrypt submitted cleaner
        env:
          TEAM_CODE_PRIVATE_KEY: ${{ secrets.TEAM_CODE_PRIVATE_KEY }}
        run: |
          test -n "$TEAM_CODE_PRIVATE_KEY"
          printf '%s' "$TEAM_CODE_PRIVATE_KEY" > "$RUNNER_TEMP/team_code_key.pem"
          chmod 600 "$RUNNER_TEMP/team_code_key.pem"
          openssl cms -decrypt \
            -inform DER \
            -in submission/clean.py.cms \
            -recip .github/tournament/public_keys/team_code_cert.pem \
            -inkey "$RUNNER_TEMP/team_code_key.pem" \
            -out "$RUNNER_TEMP/submission_clean.py"
          rm -f "$RUNNER_TEMP/team_code_key.pem"

      - name: Run cleaner
        run: |
          mkdir -p artifacts
          uv run python "$RUNNER_TEMP/submission_clean.py" \
            --train-input data/train_features.csv \
            --test-input data/test_features.csv \
            --train-output artifacts/cleaned_train.csv \
            --test-output artifacts/cleaned_test.csv

      - name: Validate cleaner outputs
        run: |
          uv run python - <<'PY'
          from pathlib import Path

          import pandas as pd

          expected_test_ids = set(pd.read_csv("data/test_features.csv")["record_id"].astype(str))
          train_ids = set(pd.read_csv("data/train_labels.csv")["record_id"].astype(str))
          for path in ["artifacts/cleaned_train.csv", "artifacts/cleaned_test.csv"]:
              output_path = Path(path)
              if not output_path.is_file() or output_path.is_symlink():
                  raise SystemExit(f"{path} must be a regular CSV file")
              frame = pd.read_csv(output_path)
              if "record_id" not in frame.columns:
                  raise SystemExit(f"{path} must contain record_id")
              record_ids = frame["record_id"].astype(str)
              if record_ids.duplicated().any():
                  raise SystemExit(f"{path} must contain each cleaned record_id at most once")
              if "delay_risk" in frame.columns:
                  raise SystemExit(f"{path} must not contain delay_risk")
              if path.endswith("cleaned_train.csv") and not set(record_ids).issubset(train_ids):
                  raise SystemExit(f"{path} contains unknown train record_id values")
              if path.endswith("cleaned_test.csv") and set(record_ids) != expected_test_ids:
                  raise SystemExit(f"{path} must contain exactly one row for each public test record_id")
          PY

      - name: Encrypt cleaner outputs
        run: |
          openssl cms -encrypt \
            -aes-256-cbc \
            -binary \
            -outform DER \
            -in artifacts/cleaned_train.csv \
            -out artifacts/cleaned_train.csv.cms \
            .github/tournament/public_keys/cleaned_output_cert.pem
          openssl cms -encrypt \
            -aes-256-cbc \
            -binary \
            -outform DER \
            -in artifacts/cleaned_test.csv \
            -out artifacts/cleaned_test.csv.cms \
            .github/tournament/public_keys/cleaned_output_cert.pem
          cp submission/manifest.json artifacts/manifest.json
          cat > artifacts/run_metadata.json <<EOF
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "head_sha": "${{ github.event.pull_request.head.sha }}",
            "head_repo": "${{ github.event.pull_request.head.repo.full_name }}"
          }
          EOF
          rm -f artifacts/cleaned_train.csv artifacts/cleaned_test.csv

      - name: Upload encrypted cleaner outputs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cleaned-output
          if-no-files-found: error
          retention-days: 7
          path: |
            artifacts/cleaned_train.csv.cms
            artifacts/cleaned_test.csv.cms
            artifacts/manifest.json
            artifacts/run_metadata.json
