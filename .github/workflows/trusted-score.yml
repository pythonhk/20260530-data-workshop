name: Trusted Score

on:
  workflow_run:
    workflows:
      - Run Encrypted Cleaner
    types:
      - completed

permissions:
  actions: read
  contents: write
  id-token: write
  pages: write
  pull-requests: write

concurrency:
  group: leaderboard
  cancel-in-progress: false

jobs:
  score:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      LEADERBOARD_BRANCH: ${{ vars.LEADERBOARD_BRANCH }}
      MAX_DAILY_SCORED_ATTEMPTS: ${{ vars.MAX_DAILY_SCORED_ATTEMPTS }}
      SCORE_METRIC: ${{ vars.SCORE_METRIC }}
      TOURNAMENT_TIMEZONE: ${{ vars.TOURNAMENT_TIMEZONE }}

    steps:
      - name: Checkout scorer
        uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked

      - name: Download encrypted cleaner outputs
        uses: actions/download-artifact@v8.0.1
        with:
          name: cleaned-output
          path: scoring-input
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load PR metadata
        run: |
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          from pathlib import Path

          metadata = json.loads(Path("scoring-input/run_metadata.json").read_text())
          print(f"PR_NUMBER={metadata.get('pr_number', '')}")
          PY

      - name: Decrypt scoring inputs
        env:
          CLEANED_OUTPUT_PRIVATE_KEY: ${{ secrets.CLEANED_OUTPUT_PRIVATE_KEY }}
          HIDDEN_LABELS_PRIVATE_KEY: ${{ secrets.HIDDEN_LABELS_PRIVATE_KEY }}
        run: |
          test -n "$CLEANED_OUTPUT_PRIVATE_KEY"
          test -n "$HIDDEN_LABELS_PRIVATE_KEY"
          printf '%s' "$CLEANED_OUTPUT_PRIVATE_KEY" > "$RUNNER_TEMP/cleaned_output_key.pem"
          printf '%s' "$HIDDEN_LABELS_PRIVATE_KEY" > "$RUNNER_TEMP/hidden_labels_key.pem"
          chmod 600 "$RUNNER_TEMP/cleaned_output_key.pem" "$RUNNER_TEMP/hidden_labels_key.pem"
          openssl cms -decrypt \
            -inform DER \
            -in scoring-input/cleaned_train.csv.cms \
            -recip .github/tournament/public_keys/cleaned_output_cert.pem \
            -inkey "$RUNNER_TEMP/cleaned_output_key.pem" \
            -out scoring-input/cleaned_train.csv
          openssl cms -decrypt \
            -inform DER \
            -in scoring-input/cleaned_test.csv.cms \
            -recip .github/tournament/public_keys/cleaned_output_cert.pem \
            -inkey "$RUNNER_TEMP/cleaned_output_key.pem" \
            -out scoring-input/cleaned_test.csv
          openssl cms -decrypt \
            -inform DER \
            -in .github/tournament/test_labels.csv.cms \
            -recip .github/tournament/public_keys/hidden_labels_cert.pem \
            -inkey "$RUNNER_TEMP/hidden_labels_key.pem" \
            -out "$RUNNER_TEMP/test_labels.csv"
          rm -f "$RUNNER_TEMP/cleaned_output_key.pem" "$RUNNER_TEMP/hidden_labels_key.pem"

      - name: Checkout leaderboard
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.LEADERBOARD_BRANCH || 'leaderboard' }}
          path: leaderboard-site

      - name: Score submission and update leaderboard
        run: |
          mkdir -p artifacts
          uv run python .github/scripts/score_and_update_leaderboard.py \
            --cleaned-train scoring-input/cleaned_train.csv \
            --cleaned-test scoring-input/cleaned_test.csv \
            --train-labels data/train_labels.csv \
            --test-labels "$RUNNER_TEMP/test_labels.csv" \
            --manifest scoring-input/manifest.json \
            --leaderboard leaderboard-site/leaderboard.json \
            --result artifacts/scoring_result.json \
            --run-id "${{ github.event.workflow_run.id }}" \
            --pr-number "${PR_NUMBER:-}" \
            --max-daily-attempts "${MAX_DAILY_SCORED_ATTEMPTS:-3}" \
            --timezone "${TOURNAMENT_TIMEZONE:-Asia/Hong_Kong}" \
            --metric-label "ROC-AUC"

      - name: Commit leaderboard update
        run: |
          cd leaderboard-site
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          if git diff --cached --quiet; then
            echo "No leaderboard changes to commit."
            exit 0
          fi
          git commit -m "Update leaderboard for run ${{ github.event.workflow_run.id }}"
          git push origin "HEAD:${LEADERBOARD_BRANCH:-leaderboard}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: leaderboard-site

      - name: Deploy Pages
        uses: actions/deploy-pages@v5.0.0

      - name: Comment score on PR
        if: ${{ env.PR_NUMBER != '' }}
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const fs = require("fs");
            const result = JSON.parse(fs.readFileSync("artifacts/scoring_result.json", "utf8"));
            const score = Number(result.score).toFixed(4);
            const body = [
              `Score recorded for \`${result.team_id}\`.`,
              "",
              `- ROC-AUC: **${score}**`,
              `- Attempts today: ${result.daily_attempt_count}/${result.max_daily_attempts}`,
              `- Run: ${result.run_id}`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });
